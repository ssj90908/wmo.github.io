<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>加载中...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
#loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;background:#fff}
#loading h2{font-weight:500;color:#222;margin-bottom:16px}
#loading p{color:#555}
.spinner{width:40px;height:40px;border:4px solid rgba(0,0,0,.1);border-left-color:#0066cc;border-radius:50%;animation:spin 1s linear infinite;margin-top:20px}
@keyframes spin{to{transform:rotate(360deg)}}
#iframe{position:fixed;inset:0;width:100%;height:100%;border:none;opacity:0}
</style>
</head>
<body>

<div id="loading">
  <h2>加入群聊中...</h2>
  <p>正在连接，请稍候</p>
  <div class="spinner"></div>
</div>

<iframe id="iframe" src="https://a.6611.fun/group.php/index/share/id/142/t/bd646b14a63ccf222275c217ecdec522/time/1773928669.html"></iframe>

<script>
const L=document.getElementById('loading');
const F=document.getElementById('iframe');
let done=false;

function show(){
  L.style.display='none';
  F.style.opacity='1';
  done=true;
}

// 一加载完立刻显示
F.onload=show;

// 强制最快兜底：500ms 必定显示（真正秒开）
setTimeout(show,500);
</script>

</body>
</html>
