<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>加入群聊</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #fff;
        }
        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0; /* 一开始隐藏 */
            transition: opacity 0.3s;
            z-index: 2;
        }
        /* 加载动画 */
        .loading {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .loading.hide {
            display: none;
        }
    </style>
</head>
<body>

    <div class="loading" id="loading">
        加载中...
    </div>

    <iframe id="myFrame" src="https://a.6611.fun/group.php/index/share/id/145/t/f6d161e1809b714811a64697602cc240/time/1773506499.html"></iframe>

    <script>
        var iframe = document.getElementById('myFrame');
        var loading = document.getElementById('loading');

        // 一打开就开始预加载，同时显示动画
        iframe.onload = function() {
            // 加载完成 → 隐藏动画 → 显示页面
            loading.classList.add('hide');
            iframe.style.opacity = 1;
        };
    </script>

</body>
</html>
