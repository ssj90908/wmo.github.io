<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

#iframe {
  position: fixed; top:0; left:0; width:100%; height:100%;
  border:none; opacity:0; transition: opacity 0.35s ease;
}

#loading {
  position: fixed; top:0; left:0; width:100%; height:100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index:999; background-size: cover; background-position: center;
  transition: opacity 0.35s ease;
}
#loading h2 {
  font-weight:500; color:#222; margin-bottom:16px;
  text-shadow: 0 1px 3px rgba(255,255,255,0.9);
}
#loading p {
  color:#333; text-shadow: 0 1px 3px rgba(255,255,255,0.9);
}

.spinner {
  width:42px; height:42px; border-radius:50%;
  border:4px solid rgba(0,0,0,0.1);
  border-left-color: #0066cc;
  animation: spin 1s linear infinite; margin-top:20px;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes slideUp { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }
@keyframes scale { from { transform: scale(0.9); opacity:0; } to { transform: scale(1); opacity:1; } }
</style>
</head>

<body>

<div id="loading">
  <h2 id="lt">加入群聊中...</h2>
  <p id="ld">正在为您连接群聊，请稍候</p>
  <div class="spinner"></div>
</div>

<!-- 预加载 iframe -->
<iframe id="iframe" src="https://a.6611.fun/group.php/index/share/id/142/t/bd646b14a63ccf222275c217ecdec522/time/1773928669.html"></iframe>

<script>
const loading = document.getElementById('loading');
const iframe = document.getElementById('iframe');

// 应用随机样式
loading.style.background = cfg.bg;
if (bgImg) loading.style.backgroundImage = `url(${bgImg})`;
document.getElementById('lt').innerText = cfg.loadingTitle;
document.getElementById('lt').style.fontSize = cfg.titleSize;
document.getElementById('ld').innerText = cfg.loadingText;
document.getElementById('ld').style.fontSize = cfg.textSize;

if (cfg.anim === 'slideUp') loading.style.animation = 'slideUp 0.4s ease';
if (cfg.anim === 'scale') loading.style.animation = 'scale 0.4s ease';

// ====================== 核心：预加载 + 监听完成自动切换 ======================
let loaded = false;

function showPage() {
  loading.style.opacity = '0';
  setTimeout(() => {
    loading.style.display = 'none';
    iframe.style.opacity = '1';
  }, 300);
}

iframe.onload = function () {
  loaded = true;
  setTimeout(showPage, 600);
};

setTimeout(() => {
  if (!loaded) showPage();
}, 3000);
</script>

</body>
